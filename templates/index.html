<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="fas fa-tasks"></i>
                Gerenciador de Tarefas
            </h1>
        </header>

        <div class="add-task-section">
            <h2>Adicionar Nova Tarefa</h2>
            <form id="taskForm">
                <div class="form-group">
                    <input type="text" id="taskTitle" placeholder="Título da tarefa" required>
                </div>
                <div class="form-group">
                    <textarea id="taskDescription" placeholder="Descrição da tarefa" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Adicionar Tarefa
                </button>
            </form>
        </div>

        <div class="tasks-section">
            <h2>Minhas Tarefas</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Concluídas</button>
            </div>
            <div id="tasksList" class="tasks-list">
                <!-- Tarefas serão carregadas aqui -->
            </div>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Editar Tarefa</h3>
                <span class="close">&times;</span>
            </div>
            <form id="editTaskForm">
                <input type="hidden" id="editTaskId">
                <div class="form-group">
                    <label for="editTaskTitle">Título</label>
                    <input type="text" id="editTaskTitle" placeholder="Digite o título da tarefa" required>
                </div>
                <div class="form-group">
                    <label for="editTaskDescription">Descrição</label>
                    <textarea id="editTaskDescription" placeholder="Digite a descrição da tarefa" rows="3"></textarea>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="editTaskCompleted"> Marcar como concluída
                    </label>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
